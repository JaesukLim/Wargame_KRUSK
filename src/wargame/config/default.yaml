simulation:
  random_seed: 19430712
  ticks_per_second: 30
  fixed_dt: 0.2
  duration_seconds: 600


  scenario:
    auto_assign_tank_routes: true

  backend:
    host: 127.0.0.1
    port: 8765

  detection:
    # Scanned probabilistic detection.
    # confidence = base * range_factor * terrain_modifier * altitude_modifier + fire_event_bonus
    base_probability: 0.86
    max_detection_range_m: 3500
    probabilistic: true
    min_confidence_to_report: 0.05
    range_decay_power: 0.85
    blocked_los_factor: 0.35
    fire_event_bonus: 0.18
    fire_event_memory_s: 35
    terrain_modifiers:
      plain: 1.0
      hill: 0.92
      mountain: 0.78
      water: 0.9
      forest: 0.8
      urban: 0.9
    altitude_modifiers:
      low: 0.8
      mid: 0.9
      high: 1.0

  combat:
    lanchester_range_m: 1800
    default_k_attacker: 0.0025
    default_k_defender: 0.0025
    terrain_damping:
      plain: 1.0
      hill: 0.93
      mountain: 0.82
      water: 0.0

  command:
    # Detection reports must travel detector -> rear command post -> artillery.
    # If a custom scenario has no command units, the simulator falls back to
    # older side-wide shared spotting so legacy scenarios remain playable.
    require_hq_for_artillery_tasking: true
    relay_log_interval_s: 20
    detection_log_interval_s: 25

    observer_to_hq_delay_s: 60.0
    hq_processing_delay_s: 30.0
    hq_to_artillery_delay_s: 90.0
    artillery_order_processing_delay_s: 45.0


